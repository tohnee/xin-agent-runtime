name: Python Unittest Coverage

on: [push, pull_request]

jobs:
  test:
    if: false == contains(github.event.pull_request.title, 'WIP')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11']
    env:
      OS: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install -e ".[xruntime-dev]"
    - name: Run XRuntime tests (file-by-file)
      env:
        GRPC_VERBOSITY: ERROR
      run: |
        FAIL=0
        for f in $(find tests/xruntime -name 'test_*.py' | sort); do
          echo "=== $f ==="
          pytest "$f" -q -p no:cacheprovider || FAIL=1
        done
        exit $FAIL
