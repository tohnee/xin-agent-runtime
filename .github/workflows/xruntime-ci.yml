name: Xin Agent Runtime CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[xruntime-dev]" flake8 "black==23.3.0"

      - name: Run flake8
        run: |
          flake8 --extend-ignore=E203,W503,E704 src/xruntime

      - name: Run black check
        run: |
          black --line-length=79 --check src/xruntime tests/xruntime

  test:
    name: Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[xruntime-dev]"

      - name: Run all XRuntime tests
        env:
          GRPC_VERBOSITY: ERROR
        run: |
          pytest tests/xruntime -v --tb=short -p no:cacheprovider

      - name: Run coverage (best-effort)
        continue-on-error: true
        env:
          GRPC_VERBOSITY: ERROR
        run: |
          pytest tests/xruntime -q \
            --cov=xruntime \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Check coverage threshold
        if: always()
        continue-on-error: true
        run: |
          if [ ! -f coverage.xml ]; then
            echo "coverage.xml not found, skipping threshold check"
            exit 0
          fi
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          pct = float(root.attrib.get('line-rate', 0)) * 100
          print(f'Coverage: {pct:.1f}%')
          if pct < 80:
              print(f'WARNING: Coverage {pct:.1f}% < 80% threshold')
              exit(0)
          print('Coverage OK')
          "

      - name: Verify test count
        run: |
          COUNT=$(pytest tests/xruntime --co -q 2>/dev/null | tail -1 | grep -oP '\d+' | head -1)
          echo "Test count: $COUNT"
          if [ "$COUNT" -lt 440 ]; then
            echo "ERROR: Expected at least 440 tests, got $COUNT"
            exit 1
          fi

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: xruntime-coverage-${{ matrix.python-version }}
          path: coverage.xml

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[xruntime-dev]"

      - name: RBAC permission matrix
        run: pytest tests/xruntime/test_rbac_policy.py tests/xruntime/test_rbac_defaults.py -v

      - name: Auth membership + anti-spoofing
        run: pytest tests/xruntime/test_auth_membership.py -v

      - name: Knowledge ACL + scope isolation
        run: pytest tests/xruntime/test_knowledge_acl.py tests/xruntime/test_knowledge_scope.py -v

      - name: Phase 1 security (AuthMiddleware + KB ACL)
        run: pytest tests/xruntime/test_phase1_security.py -v

      - name: Phase 2 LLM-Wiki (BM25 + audit + redaction)
        run: pytest tests/xruntime/test_phase2_llm_wiki.py -v

      - name: Phase 3 ExecutionPlan + permissions tightening
        run: pytest tests/xruntime/test_phase3_execution_plan.py -v

      - name: Phase 4-6 Workspace + Model + Langfuse
        run: pytest tests/xruntime/test_phase4_6_workspace_model_langfuse.py -v

      - name: Coverage gaps (_tools.py + _auth.py)
        run: pytest tests/xruntime/test_coverage_gaps.py -v

      - name: Remaining gaps (plan wiring + OpenCode schema + frontmatter + budget)
        run: pytest tests/xruntime/test_phase_remaining_gaps.py -v

      - name: Server workspace wiring
        run: pytest tests/xruntime/test_server_workspace.py -v

      - name: Workspace + RBAC integration (31 scenarios)
        run: pytest tests/xruntime/integration/test_workspace_rbac_integration.py -v
