name: XRuntime CI

on:
  push:
    branches: [main]
    paths:
      - "src/xruntime/**"
      - "tests/xruntime/**"
      - "src/agentscope/**"
      - ".github/workflows/xruntime-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/xruntime/**"
      - "tests/xruntime/**"
      - "src/agentscope/**"

jobs:
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv pip install -q -e .[dev]
          uv pip install flake8 black

      - name: Run flake8
        run: |
          flake8 --extend-ignore=E203,W503,E704 src/xruntime

      - name: Run black check
        run: |
          black --line-length=79 --check src/xruntime

  test:
    name: Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv pip install -q -e .[dev]
          uv pip install pytest pytest-cov coverage

      - name: Run XRuntime tests with coverage
        env:
          GRPC_VERBOSITY: ERROR
        run: |
          pytest tests/xruntime -q \
            --cov=xruntime \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Run XRuntime integration tests
        run: |
          pytest tests/xruntime/integration -v

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: xruntime-coverage-${{ matrix.python-version }}
          path: coverage.xml

  security-check:
    name: Security Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv pip install -q -e .[dev]

      - name: Run RBAC permission matrix tests
        run: |
          pytest tests/xruntime/test_rbac_policy.py tests/xruntime/test_rbac_defaults.py -v

      - name: Run auth membership tests
        run: |
          pytest tests/xruntime/test_auth_membership.py -v

      - name: Run knowledge ACL tests
        run: |
          pytest tests/xruntime/test_knowledge_acl.py tests/xruntime/test_knowledge_scope.py -v

      - name: Run Phase 1 security tests
        run: |
          pytest tests/xruntime/test_phase1_security.py -v

      - name: Run workspace + RBAC integration tests
        run: |
          pytest tests/xruntime/integration/test_workspace_rbac_integration.py -v

      - name: Run coverage gap tests
        run: |
          pytest tests/xruntime/test_coverage_gaps.py -v
