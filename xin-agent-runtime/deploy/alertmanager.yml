# Alertmanager configuration for XRuntime.
# Routes: critical → PagerDuty, warning → Slack.

route:
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://slack-webhook:5000/alert'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://pagerduty-webhook:5000/critical'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/REPLACE_ME'
        channel: '#xruntime-alerts'
        send_resolved: true

routes:
  - match:
      severity: critical
    receiver: 'critical'
    group_wait: 10s
    repeat_interval: 1h
  - match:
      severity: warning
    receiver: 'default'
    repeat_interval: 4h
