version: '3.8'

# XRuntime observability stack — OTel + Prometheus + Jaeger + ELK.
# Usage: docker compose -f deploy/docker-compose.observability.yml up -d

services:
  xruntime:
    build: ..
    ports: ['8900:8900']
    environment:
      XRUNTIME_OBSERVABILITY_OTEL_ENABLED: "true"
      XRUNTIME_OBSERVABILITY_OTEL_ENDPOINT: "http://otel-collector:4317"
      XRUNTIME_OBSERVABILITY_AUDIT_ENABLED: "true"
      XRUNTIME_OBSERVABILITY_AUDIT_STORAGE: "file"
      XRUNTIME_CREDENTIAL_BROKER_REDIS_URL: "redis://redis:6379/0"
      XRUNTIME_CREDENTIAL_BROKER_AUTO_ROTATE_ENABLED: "true"
    depends_on: [redis, otel-collector]
    volumes:
      - xruntime-logs:/var/log/xruntime

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    ports: ['4317:4317', '4318:4318', '8889:8889']
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    command: ["--config=/etc/otelcol/config.yaml"]

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - '16686:16686'
      - '14250:14250'
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v2.52.0
    ports: ['9090:9090']
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts.yml:/etc/prometheus/alerts.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports: ['9093:9093']
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports: ['9200:9200']

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.0
    ports: ['5601:5601']
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    depends_on: [elasticsearch]

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.14.0
    user: root
    volumes:
      - xruntime-logs:/var/log/xruntime:ro
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on: [elasticsearch]
    command: ["filebeat", "-e", "-c", "/usr/share/filebeat/filebeat.yml"]

volumes:
  xruntime-logs:
