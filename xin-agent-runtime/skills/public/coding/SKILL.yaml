name: coding
description: >
  Write, debug, and execute code to solve programming tasks.
  Use when user asks to implement, fix, or review code.
version: "1.0.0"
allowed_tools: [bash, read_file, write_file, edit, grep, glob]
permissions: [filesystem:read_write]
instructions: |
  # Coding Skill

  ## When to Use
  - User asks to implement a feature
  - User asks to fix a bug
  - User asks to review or refactor code

  ## Workflow
  1. Understand the requirements and existing codebase
  2. Plan the implementation approach
  3. Write code incrementally with tests
  4. Run tests and fix any failures
  5. Review the final implementation

  ## Best Practices
  - Follow existing code style and conventions
  - Write clear commit messages
  - Add tests for new functionality
  - Handle edge cases explicitly
