name: Xin Agent Runtime CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[xruntime-dev]" flake8 "black==23.3.0"

      - name: Run flake8
        run: |
          flake8 --extend-ignore=E203,W503,E704 src/xruntime

      - name: Run black check
        run: |
          black --line-length=79 --check src/xruntime tests/xruntime

  test:
    name: Enterprise Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[xruntime-dev]"

      - name: Run RBAC permission matrix
        run: pytest tests/xruntime/test_rbac_policy.py tests/xruntime/test_rbac_defaults.py -v

      - name: Run auth membership + anti-spoofing
        run: pytest tests/xruntime/test_auth_membership.py -v

      - name: Run knowledge ACL + scope isolation
        run: pytest tests/xruntime/test_knowledge_acl.py tests/xruntime/test_knowledge_scope.py -v

      - name: Run Phase 1 security (AuthMiddleware + KB ACL)
        run: pytest tests/xruntime/test_phase1_security.py -v

      - name: Run Phase 2 LLM-Wiki (BM25 + audit + redaction)
        run: pytest tests/xruntime/test_phase2_llm_wiki.py -v

      - name: Run Phase 3 ExecutionPlan + permissions tightening
        run: pytest tests/xruntime/test_phase3_execution_plan.py -v

      - name: Run Phase 4-6 Workspace + Model + Langfuse
        run: pytest tests/xruntime/test_phase4_6_workspace_model_langfuse.py -v

      - name: Run coverage gaps (_tools.py + _auth.py)
        run: pytest tests/xruntime/test_coverage_gaps.py -v

      - name: Run remaining gaps (plan wiring + OpenCode schema + frontmatter + budget)
        run: pytest tests/xruntime/test_phase_remaining_gaps.py -v

      - name: Run server workspace wiring
        run: pytest tests/xruntime/test_server_workspace.py -v

      - name: Run workspace + RBAC integration (31 scenarios)
        run: pytest tests/xruntime/integration/test_workspace_rbac_integration.py -v

      - name: Run original AS tests (best-effort)
        continue-on-error: true
        run: |
          pytest tests/xruntime/test_anthropic_adapter.py \
                 tests/xruntime/test_claude_code_adapter.py \
                 tests/xruntime/test_opencode_adapter.py \
                 tests/xruntime/test_request_adapter.py \
                 tests/xruntime/test_config.py \
                 tests/xruntime/test_extension.py \
                 tests/xruntime/test_handler_fixes.py \
                 tests/xruntime/test_knowledge.py \
                 tests/xruntime/test_middlewares.py \
                 tests/xruntime/test_migrator.py \
                 tests/xruntime/test_orchestrator.py \
                 tests/xruntime/test_server.py \
                 tests/xruntime/test_tenant.py \
                 tests/xruntime/test_e2e_request_path.py \
                 -v --tb=short
