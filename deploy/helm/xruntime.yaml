apiVersion: v1
kind: Service
metadata:
  name: xruntime
  labels:
    app: xruntime
spec:
  selector:
    app: xruntime
  ports:
    - port: 8900
      targetPort: 8900
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xruntime
  labels:
    app: xruntime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: xruntime
  template:
    metadata:
      labels:
        app: xruntime
    spec:
      containers:
        - name: xruntime
          image: xruntime:latest
          ports:
            - containerPort: 8900
          env:
            - name: XRUNTIME_STORAGE_REDIS_HOST
              value: "redis"
            - name: XRUNTIME_MESSAGE_BUS_REDIS_HOST
              value: "redis"
            - name: XRUNTIME_SERVER_AUTH_ENABLED
              value: "true"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8900
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8900
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: xruntime
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: xruntime
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
