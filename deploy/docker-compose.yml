version: "3.9"

services:
  xruntime:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8900:8900"
    environment:
      - XRUNTIME_STORAGE_REDIS_HOST=redis
      - XRUNTIME_MESSAGE_BUS_REDIS_HOST=redis
      - XRUNTIME_SERVER_AUTH_ENABLED=true
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
